<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Vermicast ERP</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-leaf" style="font-size: 50px;"></i>
                </div>
                <h1>Vermicast ERP</h1>
                <p>Prototype System</p>
            </div>
            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="username"><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="username" placeholder="Enter username" required>
                </div>
                
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
            <div style="padding: 20px; background: var(--bg-color); text-align: center; font-size: 12px; color: #666;">
                <p><strong>Demo Credentials:</strong></p>
                <small>Admin: admin / password123</small><br>
                <small>Staff: staff1 / password123</small><br>
                <small>Manager: manager1 / password123</small>
            </div>
        </div>
    </div>

    <script src="js/store.js"></script>
    <script src="js/ui.js"></script>
    <script>
        // Ensure data is initialized before any user interaction
        initData();

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const users = getData('users');
            const user = users.find(u => u.username === username && u.password === password);

            if (user) {
                if (user.status !== 'Active') {
                    alert('Account is inactive. Please contact administrator.');
                    return;
                }
                // Store session (exclude password from session)
                const { password: _, ...userSession } = user;
                localStorage.setItem('currentUser', JSON.stringify(userSession));
                window.location.href = 'dashboard.html';
            } else {
                alert('Invalid username or password.');
            }
        });
    </script>
</body>
</html>
