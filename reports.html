<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Vermicast ERP</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <h3><i class="fas fa-leaf"></i> VERMICAST</h3>
            <p>ERP System</p>
        </div>
        <ul class="nav-menu">
            <li id="nav-dashboard"><a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
            <li id="nav-inventory"><a href="inventory.html"><i class="fas fa-boxes"></i> Inventory</a></li>
            <li id="nav-production"><a href="production.html"><i class="fas fa-industry"></i> Production</a></li>
            <li id="nav-sales"><a href="sales.html"><i class="fas fa-shopping-cart"></i> Sales</a></li>
            <li id="nav-forecast"><a href="forecast_view.html"><i class="fas fa-chart-line"></i> Forecasting</a></li>
            <li id="nav-reports"><a href="reports.html"><i class="fas fa-file-alt"></i> Reports</a></li>
            <li id="nav-users"><a href="users.html"><i class="fas fa-users"></i> Users</a></li>
            <li id="nav-settings"><a href="settings.html"><i class="fas fa-cog"></i> Settings</a></li>
        </ul>
        <div class="sidebar-footer">
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span id="display-name">User</span>
            </div>
            <span class="role-badge" id="display-role">ROLE</span>
            <a href="#" onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </nav>

    <main class="content">
        <header class="top-bar">
            <h2>Reports & Analytics</h2>
        </header>

        <div class="main-content">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="avg-sales">0 sacks</div>
                    <p>Avg Monthly Sales</p>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3><i class="fas fa-clipboard-list"></i> Inventory Transaction Summary</h3>
                </div>
                <div class="card-body">
                    <table class="data-table" id="summary-table">
                        <thead>
                            <tr>
                                <th>Metric</th>
                                <th>Value</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="js/store.js"></script>
    <script src="js/ui.js"></script>
    <script>
        const user = checkAuth();
        if (user.role !== 'admin') {
            alert('Access denied. Reports are admin-only.');
            window.location.href = 'dashboard.html';
        }
        applyRoleStyles();
        initSidebar();

        function generateReports() {
            const sales = getData('sales');
            const settings = getSettings();
            const production = getData('production');
            
            const totalSales = sales.reduce((acc, s) => acc + s.amount, 0);
            const avg = sales.length > 0 ? (totalSales / sales.length).toFixed(1) : 0;
            document.getElementById('avg-sales').textContent = `${avg} sacks`;

            const tbody = document.querySelector('#summary-table tbody');
            const totalProduced = production.filter(p => p.status === 'Completed').reduce((acc, p) => acc + p.qty, 0);
            
            tbody.innerHTML = `
                <tr><td>Total Vermicast Produced</td><td><strong>${totalProduced} sacks</strong></td></tr>
                <tr><td>System Status</td><td><span class="status-badge ok">Operational</span></td></tr>
            `;
        }

        generateReports();
    </script>
</body>
</html>
